name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate release versions
        run: node scripts/validate-release.mjs "${GITHUB_REF_NAME}"

  build-extensions:
    needs: validate-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SDK dependencies
        run: bun install --cwd packages/devland-sdk --frozen-lockfile

      - name: Build extension archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets/extensions

          for extension_dir in extensions/*; do
            [ -d "$extension_dir" ] || continue

            bun install --cwd "$extension_dir" --frozen-lockfile
            bun run --cwd "$extension_dir" pack

            extension_name="$(basename "$extension_dir")"
            cp "$extension_dir/$extension_name.tgz" "release-assets/extensions/$extension_name.tgz"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: extensions-release-assets
          path: release-assets/extensions/*
          if-no-files-found: error

  build-app:
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: app-macos
          - os: windows-latest
            artifact_name: app-windows
          - os: ubuntu-latest
            artifact_name: app-linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes rpm

      - name: Install app dependencies
        run: bun install --cwd devland-app --frozen-lockfile

      - name: Prepare macOS signing inputs
        if: runner.os == 'macOS'
        id: mac_signing
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CSC_LINK}" || -z "${CSC_KEY_PASSWORD}" || -z "${APPLE_API_KEY}" || -z "${APPLE_API_KEY_ID}" || -z "${APPLE_API_ISSUER}" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          apple_api_key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "${APPLE_API_KEY}" > "${apple_api_key_path}"

          echo "enabled=true" >> "${GITHUB_OUTPUT}"
          echo "apple_api_key_path=${apple_api_key_path}" >> "${GITHUB_OUTPUT}"

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && steps.mac_signing.outputs.enabled == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build app packages
        env:
          DEVLAND_MAC_SIGNING_ENABLED: ${{ steps.mac_signing.outputs.enabled || 'false' }}
          APPLE_API_KEY: ${{ steps.mac_signing.outputs.apple_api_key_path || '' }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER || '' }}
        run: bun run --cwd devland-app make

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            devland-app/out/make/**/*
            !devland-app/out/make/**/*.blockmap
          if-no-files-found: error

  publish-release:
    needs:
      - build-extensions
      - build-app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          files=()
          for path in release-assets/**/*; do
            [ -f "$path" ] || continue
            files+=("$path")
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
            exit 0
          fi

          gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
