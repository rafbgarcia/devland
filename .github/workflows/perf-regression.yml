name: Perf Regression

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  renderer-perf:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package app
        run: npm run package

      - name: Perf regression suite
        run: npm run test:perf
